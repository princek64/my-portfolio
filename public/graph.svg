<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 212" width="340" height="212">
  <defs>
    <clipPath id="card-back-clip">
      <rect width="340" height="212" rx="10" ry="10"/>
    </clipPath>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400&amp;family=Playfair+Display:wght@400&amp;display=swap');
    </style>
  </defs>

  <!-- Wine background -->
  <rect width="340" height="212" rx="10" ry="10" fill="#7c2d3e" clip-path="url(#card-back-clip)"/>

  <!-- Inner border -->
  <rect x="12" y="12" width="316" height="188" rx="4" fill="none" stroke="rgba(242,207,196,0.2)" stroke-width="1"/>

  <!-- Centred content group -->
  <g transform="translate(170, 106)">
    <!-- Logomark (light version) -->
    <g transform="translate(-16, -56)">
      <rect x="0" y="0" width="9" height="72" rx="4" fill="#f2cfc4"/>
      <path d="M 9 4 L 9 40 Q 9 4 44 4 Q 62 4 62 22 Q 62 40 44 40 L 9 40" fill="#f2cfc4"/>
      <path d="M 16 12 Q 16 34 40 34 Q 54 34 54 22 Q 54 12 40 12 Z" fill="#7c2d3e"/>
      <polygon points="42,4 62,4 42,20" fill="#7c2d3e"/>
      <polygon points="38,12 50,12 38,22" fill="#f2cfc4"/>
      <circle cx="28" cy="26" r="2.5" fill="#c9a84c"/>
      <circle cx="38" cy="26" r="2.5" fill="#c9a84c"/>
      <path d="M 0 80 Q 30 66 62 80" fill="none" stroke="#c9a84c" stroke-width="2.5" stroke-linecap="round"/>
    </g>

    <!-- Divider rule -->
    <rect x="-16" y="26" width="32" height="1" fill="rgba(242,207,196,0.3)"/>

    <!-- Wordmark -->
    <text x="0" y="48" font-family="'Playfair Display', serif" font-size="26" font-weight="400" fill="#f2cfc4" letter-spacing="-0.5" text-anchor="middle">pixelprince</text>
    <text x="0" y="61" font-family="'DM Mono', monospace" font-size="9" fill="rgba(242,207,196,0.5)" letter-spacing="4" text-anchor="middle">.dev</text>
  </g>
