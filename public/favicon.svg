<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Indigo rounded-square background -->
  <rect width="64" height="64" rx="14" fill="#6366f1"/>

  <!--
    PixelPrince mark — "indigo" colour variant adapted for indigo background:
    body → white, counter → #6366f1 (blends into bg creating the cutout),
    eyes → white/75%.
    Compact crop (no arc/steam — illegible at small sizes).
    Scale 0.65 of the 62×74 compact mark, centred in the 64×64 icon.
    translate(12, 8) centres the ~40×48 scaled mark.
  -->
  <g transform="translate(12, 8) scale(0.65)">
    <!-- Stem -->
    <rect x="0" y="0" width="9" height="72" rx="4" fill="white"/>
    <!-- P flag body -->
    <path d="M 9 4 L 9 40 Q 9 4 44 4 Q 62 4 62 22 Q 62 40 44 40 L 9 40" fill="white"/>
    <!-- Counter cutout (matches background) -->
    <path d="M 16 12 Q 16 34 40 34 Q 54 34 54 22 Q 54 12 40 12 Z" fill="#6366f1"/>
    <!-- Top-right corner cutout -->
    <polygon points="42,4 62,4 42,20" fill="#6366f1"/>
    <!-- Inner flag triangle (restores white) -->
    <polygon points="38,12 50,12 38,22" fill="white"/>
    <!-- Eyes — slightly larger radius so they survive at 16px tab size -->
    <circle cx="28" cy="26" r="3" fill="rgba(255,255,255,0.8)"/>
    <circle cx="38" cy="26" r="3" fill="rgba(255,255,255,0.8)"/>
  </g>
</svg>
